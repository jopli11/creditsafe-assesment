# Local full stack for the walkthrough: Postgres → API (migrations + uvicorn) → Vite.
# Browser calls API at localhost:8000 from the host; CORS_ORIGINS matches Vite on 5173.
# Backend DATABASE_URL uses hostname `db` (Docker network), not localhost.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: customers
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Longer start_period: cold Postgres init on Docker Desktop can exceed default healthcheck windows.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d customers"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 90s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@db:5432/customers
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
